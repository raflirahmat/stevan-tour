<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gallery - Stevan Tour</title>

<body class="bg-slate-50">

        </div>

        <div class="aspect-square overflow-hidden rounded-2xl shadow-sm">

        </div>
         <div class="aspect-square overflow-hidden rounded-2xl shadow-sm">
            <img src="img/ayunan.jpg" class="w-full h-full object-cover hover:scale-110 transition duration-500" alt="Snorkeling">
